# Страница добавления вариантов ответа к опросу
{% extends 'base.html' %}

{% block content %}
<h2>Add Option to Survey</h2>
<form method="post">
    <label for="description">Option Description:</label>
    <input type="text" id="description" name="description" required />

    <button type="submit">Add Option</button>
</form>

<h3>Current Options:</h3>
<ul>
    {% for option in options %}
    <li>{{ option[1] }}</li>
    {% endfor %}
</ul>

<a href="{{ url_for('index') }}">Back to Surveys</a>
{% endblock %}
